name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  
jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
      
      - name: Install dependencies
        run: |
          python -m pip install mypy==2.1.0
      
      - name: Type check
        run: python -m mypy .
